name: Release Agents OS image

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      channel:
        description: "Release channel tag (e.g. dev, latest, edge)"
        required: false
        default: "dev"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/agents-os

jobs:
  build-and-push:
    name: Build and push agents-os image
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        run: |
          VERSION="${GITHUB_REF_NAME:-0.0.0}"
          CHANNEL="${{ github.event.inputs.channel || 'latest' }}"
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            VERSION="${GITHUB_SHA::8}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "channel=$CHANNEL" >> "$GITHUB_OUTPUT"
          echo "tags=${REGISTRY}/${IMAGE_NAME}:${VERSION},${REGISTRY}/${IMAGE_NAME}:${CHANNEL}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./os/agents-os/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            AGENTS_OS_VERSION=${{ steps.meta.outputs.version }}
            AGENTS_OS_CHANNEL=${{ steps.meta.outputs.channel }}
            AGENTS_OS_COMMIT=${{ github.sha }}
            AGENTS_OS_BUILT_AT=${{ github.event.release.published_at || github.event.head_commit.timestamp || github.event.time }}
          labels: |
            io.agents.os.version=${{ steps.meta.outputs.version }}
            io.agents.os.channel=${{ steps.meta.outputs.channel }}
            io.agents.os.commit=${{ github.sha }}
            io.agents.os.built-at=${{ github.event.release.published_at || github.event.head_commit.timestamp || github.event.time }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
