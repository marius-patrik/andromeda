name: Deploy Webhook Server

on:
  workflow_run:
    workflows:
      - Release
    types:
      - completed
  workflow_dispatch:
    inputs:
      tag:
        description: Existing image tag to deploy (e.g., v0.3.0). Defaults to the latest release tag.
        required: false
        type: string

permissions:
  contents: read
  packages: read

jobs:
  deploy:
    name: Deploy webhook server to Fly.io
    runs-on: ubuntu-latest
    if: >-
      ${{
        github.repository == 'marius-patrik/agent-darkfactory' &&
        (
          github.event_name == 'workflow_dispatch' ||
          (
            github.event_name == 'workflow_run' &&
            github.event.workflow_run.conclusion == 'success' &&
            github.event.workflow_run.head_branch == 'main'
          )
        )
      }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve deploy tag
        id: tag
        shell: bash
        run: |
          if [[ -n "${{ inputs.tag }}" ]]; then
            echo "value=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            tag="${GITHUB_REF_NAME#refs/tags/}"
            echo "value=${tag}" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          image="ghcr.io/${{ github.repository }}:${{ steps.tag.outputs.value }}"
          flyctl deploy --image "${image}" --wait-timeout=300
